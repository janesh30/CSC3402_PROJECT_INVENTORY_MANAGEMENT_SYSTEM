<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard - Stock Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Modern Dark Gradient Background */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .card {
            background-color: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(15px);
            border: 1px solid #333;
            color: #e0e0e0;
        }

        /* Gradient Text & Button Effects */
        .text-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-gradient:hover { filter: brightness(1.2); }

        /* Form Visibility & Placeholder Fix */
        .form-control, .form-select {
            background-color: #1a1a1a !important;
            border: 1px solid #444 !important;
            color: #ffffff !important;
        }
        .form-control::placeholder {
            color: #ffffff !important;
            opacity: 1;
        }

        /* ===== BULLETPROOF DARK TABLE ===== */
        .table {
            --bs-table-bg: #121212 !important;
            border-color: #333 !important;
            color: #ffffff !important;
        }

        /* Header */
        .table thead th {
            background-color: #1e1e1e !important;
            color: #F9F900 !important;
            border-color: #333 !important;
        }

        /* Body rows & Striping */
        .table tbody tr { background-color: #121212 !important; }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
        }

        /* Hover effect */
        .table-hover > tbody > tr:hover > * {
            background-color: #2a2a2a !important;
            color: #ffffff !important;
        }

        /* Force ALL text inside table to white */
        .table td, .table th {
            color: #ffffff !important;
        }

        /* ===== DARK POPOVER STYLING ===== */
        .popover {
            background-color: rgba(20, 20, 20, 0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid #39ff14 !important;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .popover-header {
            background-color: #121212 !important;
            color: #F9F900 !important;
            border-bottom: 1px solid #333 !important;
            font-weight: bold;
        }
        .popover-body {
            color: #ffffff !important;
        }
        .bs-popover-top > .popover-arrow::after, .bs-popover-auto[data-popper-placement^=top] > .popover-arrow::after {
            border-top-color: rgba(20, 20, 20, 0.95) !important;
        }
        .bs-popover-bottom > .popover-arrow::after, .bs-popover-auto[data-popper-placement^=bottom] > .popover-arrow::after {
            border-bottom-color: rgba(20, 20, 20, 0.95) !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-black shadow-sm mb-4 border-bottom border-secondary">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center">
            <a class="navbar-brand fw-bold text-gradient me-4" href="#">
                <i class="bi bi-box-seam me-2"></i>Restaurant Inventory Dashboard
            </a>
            <div class="text-white small d-none d-md-block">
                <span>Welcome, <strong class="text-warning" sec:authentication="name">User</strong></span>
                <span class="badge bg-secondary ms-2" sec:authentication="principal.authorities">Role</span>
            </div>
        </div>

        <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm fw-bold">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
</nav>

<div class="container-fluid px-4 mb-5">
    <div class="card border-0 shadow-lg">
        <div class="card-body p-4">

            <form th:action="@{/dashboard}" method="get" class="row g-2 align-items-center mb-4 pb-4 border-bottom border-secondary">
                <div class="col-md-4">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search ingredient name...">
                </div>
                <div class="col-md-3">
                    <select name="categoryId" class="form-select">
                        <option value="">-- All Categories --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == selectedCategoryId}"></option>
                    </select>
                </div>
                <div class="col-md-auto">
                    <button type="submit" class="btn btn-gradient"><i class="bi bi-search"></i> Search</button>
                </div>
            </form>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0 text-gradient"><i class="bi bi-card-list me-2"></i>Active Ingredients</h4>
                <div>
                    <a th:href="@{/ingredient/export}" class="btn btn-gradient me-2"><i class="bi bi-file-earmark-excel"></i> Export</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/ingredient/new}" class="btn btn-gradient"><i class="bi bi-plus-lg"></i> Add New</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-striped table-hover align-middle border-secondary">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ingredient</th>
                        <th>Category</th>
                        <th>Supplier</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ing : ${ingredients}">
                        <td class="fw-bold" th:text="${ing.id}"></td>
                        <td class="fw-bold" th:text="${ing.name}"></td>
                        <td th:text="${ing.category?.name}"></td>

                        <td>
                            <th:block th:if="${ing.vendor != null}">
                                <a tabindex="0" class="text-gradient text-decoration-none fw-bold" role="button"
                                   data-bs-toggle="popover"
                                   data-bs-trigger="focus"
                                   th:data-bs-title="${ing.vendor.name}"
                                   th:data-bs-content="${'📞 ' + ing.vendor.contactPhone + ' | ✉️ ' + ing.vendor.email}">
                                    <i class="bi bi-truck me-1"></i><span th:text="${ing.vendor.name}"></span>
                                </a>
                            </th:block>

                            <th:block th:unless="${ing.vendor != null}">
                                <span class="text-muted small fst-italic">
                                    <i class="bi bi-truck me-1"></i>No Supplier
                                </span>
                            </th:block>
                        </td>

                        <td class="fw-bold" th:text="${ing.quantity}"></td>
                        <td>
                            <span th:if="${ing.quantity <= ing.minimumStock}" class="badge bg-danger text-white">LOW</span>
                            <span th:if="${ing.quantity > ing.minimumStock}" class="badge bg-success text-dark">Optimal</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/ingredient/update-stock/{id}(id=${ing.id})}" class="btn btn-sm btn-outline-info">Update</a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/ingredient/edit/{id}(id=${ing.id})}" class="btn btn-sm btn-outline-primary ms-1">Edit</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
        const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));
    });
</script>
</body>
</html>
