<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock Item</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f8f9fa; }
        .form-container { max-width: 500px; background: white; padding: 30px; margin: 0 auto; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-panel { margin-top: 20px; display: flex; justify-content: space-between; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Create Inventory Entry</h2>
    <form th:action="@{/ingredient/save}" th:object="${ingredient}" method="post">
        <div class="form-group">
            <label>Ingredient Name</label>
            <input type="text" th:field="*{name}" required />
        </div>
        <div class="form-group">
            <label>Category Context</label>
            <select th:field="*{category.id}" required>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Initial Quantity</label>
            <input type="number" step="0.01" th:field="*{quantity}" required />
        </div>
        <div class="form-group">
            <label>Unit of Measure (UOM)</label>
            <input type="text" th:field="*{unitOfMeasure}" placeholder="e.g. kg, Liters, pcs" required />
        </div>
        <div class="form-group">
            <label>Minimum Stock Level Threshold</label>
            <input type="number" step="0.01" th:field="*{minimumStock}" required />
        </div>
        <div class="btn-panel">
            <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Commit to Persistent Storage</button>
        </div>
    </form>
</div>
</body>
</html>
