<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Stock Level</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f8f9fa; }
        .form-container { max-width: 400px; background: white; padding: 30px; margin: 0 auto; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .readonly-text { background-color: #e9ecef; color: #495057; cursor: not-allowed; }
        .btn-panel { margin-top: 20px; display: flex; justify-content: space-between; }
        .btn-save { background: #17a2b8; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Update Daily Stock</h2>
    <form th:action="@{/ingredient/update-stock}" method="post">
        <input type="hidden" name="id" th:value="${ingredient.id}" />

        <div class="form-group">
            <label>Ingredient Name</label>
            <input type="text" th:value="${ingredient.name}" class="readonly-text" readonly />
        </div>

        <div class="form-group">
            <label>Current Unit of Measure</label>
            <input type="text" th:value="${ingredient.unitOfMeasure}" class="readonly-text" readonly />
        </div>

        <div class="form-group">
            <label>New Quantity</label>
            <input type="number" step="0.01" name="quantity" th:value="${ingredient.quantity}" required autofocus />
        </div>

        <div class="btn-panel">
            <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Update Quantity</button>
        </div>
    </form>
</div>
</body>
</html>
