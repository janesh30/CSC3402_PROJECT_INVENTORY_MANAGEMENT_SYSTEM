<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock Item - Inventory Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Modern Dark Gradient Background */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .card {
            background-color: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(15px);
            border: 1px solid #333;
            color: #e0e0e0;
        }

        /* Gradient Text & Button Effects */
        .text-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-gradient:hover { filter: brightness(1.2); }

        /* Form Styling */
        .form-label { color: #F9F900 !important; font-weight: bold; }
        .form-control, .form-select {
            background-color: #1a1a1a !important;
            border: 1px solid #444 !important;
            color: #ffffff !important; /* Forces typed text to white */
        }

        /* Updated: Forces placeholder text to white */
        .form-control::placeholder {
            color: #ffffff !important;
            opacity: 1; /* Ensures full opacity across different browsers */
        }

        .form-control:focus, .form-select:focus {
            border-color: #39ff14 !important;
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-black shadow-sm mb-5 border-bottom border-secondary">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1 fw-bold text-gradient">
            <i class="bi bi-box-seam me-2"></i>Restaurant Inventory Dashboard
        </span>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">

            <div class="card border-0 shadow-lg rounded-3">
                <div class="card-header bg-transparent border-bottom-0 pt-4 pb-0 px-4">
                    <h3 class="fw-bold text-white mb-0">
                        <i class="bi bi-plus-circle-fill text-gradient me-2"></i>Create Inventory Entry
                    </h3>
                    <p class="text-white mt-2">Add a new ingredient instance to the master stock list.</p>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/ingredient/save}" th:object="${ingredient}" method="post">

                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-tag me-1"></i>Ingredient Name</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-lg" placeholder="e.g., Whole Milk..." required />
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label"><i class="bi bi-folder2-open me-1"></i>Category Context</label>
                                <select th:field="*{category.id}" class="form-select" required>
                                    <option value="" disabled selected>-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label"><i class="bi bi-truck me-1"></i>Supplier / Vendor</label>
                                <select th:field="*{vendor}" class="form-select" required>
                                    <option value="" disabled selected>-- Select Supplier --</option>
                                    <option th:each="ven : ${vendors}" th:value="${ven.id}" th:text="${ven.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-5 bg-dark p-3 rounded-3 border border-secondary">
                            <div class="col-md-4">
                                <label class="form-label"><i class="bi bi-boxes me-1"></i>Initial Qty</label>
                                <input type="number" step="0.01" th:field="*{quantity}" class="form-control" placeholder="0.00" required />
                            </div>
                            <div class="col-md-4 mt-3 mt-md-0">
                                <label class="form-label"><i class="bi bi-rulers me-1"></i>UOM</label>
                                <input type="text" th:field="*{unitOfMeasure}" class="form-control" placeholder="kg, Liters" required />
                            </div>
                            <div class="col-md-4 mt-3 mt-md-0">
                                <label class="form-label"><i class="bi bi-exclamation-triangle me-1"></i>Min. Threshold</label>
                                <input type="number" step="0.01" th:field="*{minimumStock}" class="form-control" placeholder="0.00" required />
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center pt-2">
                            <a th:href="@{/dashboard}" class="btn btn-gradient px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-gradient px-4 shadow-sm">
                                <i class="bi bi-database-fill-up me-2"></i>Commit to Storage
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
