<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Restaurant Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Modern Dark Gradient Background */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .card {
            background-color: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(15px);
            border: 1px solid #333;
            color: #e0e0e0;
        }

        /* Gradient Text & Button Effects */
        .text-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-gradient:hover { filter: brightness(1.2); }

        /* Form Styling */
        .form-control {
            background-color: #1a1a1a !important;
            border: 1px solid #444 !important;
            color: #fff !important;
        }
        .form-control:focus { border-color: #39ff14 !important; box-shadow: 0 0 8px rgba(57, 255, 20, 0.4); }

        /* Updated Label color to White */
        .form-floating > label { color: #fff !important; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <div class="text-center py-4 bg-black bg-opacity-25">
                    <h1 class="display-6 mb-0 text-gradient"><i class="bi bi-person-badge"></i></h1>
                    <h4 class="fw-bold mt-2 mb-0 text-white">Create Account</h4>
                    <p class="text-white small mb-0">Join the System</p>
                </div>

                <div class="card-body p-4 p-sm-5">

                    <form th:action="@{/register}" th:object="${user}" method="post">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Username" required autocomplete="off">
                            <label for="username"><i class="bi bi-person me-2"></i>Choose a Username</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Password" required>
                            <label for="password"><i class="bi bi-key me-2"></i>Create a Password</label>
                        </div>

                        <button type="submit" class="btn btn-gradient btn-lg w-100 shadow-sm mb-3">
                            Sign Up <i class="bi bi-person-plus ms-1"></i>
                        </button>
                    </form>

                    <div class="text-center mt-3 border-top border-secondary pt-3">
                        <span class="text-white small">Already have an account?</span><br>
                        <a th:href="@{/login}" class="text-decoration-none fw-bold text-gradient">Back to Login</a>
                    </div>

                </div>
            </div>

            <div class="text-center mt-4 text-muted small">
                &copy; 2026 Inventory Management System
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
