<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Restaurant Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Modern Dark Gradient Background */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .card {
            background-color: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(15px);
            border: 1px solid #333;
            color: #e0e0e0;
        }

        /* Gradient Text & Button Effects */
        .text-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #39ff14, #F9F900);
            color: #000;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-gradient:hover { filter: brightness(1.2); }

        /* General Form Styling */
        .form-control {
            background-color: #1a1a1a !important;
            border: 1px solid #444 !important;
            color: #fff !important;
        }
        .form-control:focus {
            border-color: #39ff14 !important;
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
        }

        /* ===== FLOATING LABEL FIXES ===== */

        /* 1. Prevent text collision by making the actual placeholder transparent */
        .form-floating > .form-control::placeholder {
            color: transparent !important;
        }

        /* 2. Fix the ugly white box behind the label when focused */
        .form-floating > label::after {
            background-color: #1a1a1a !important; /* Matches the dark input background */
        }

        /* 3. Ensure the label text and icon stay visible */
        .form-floating > label,
        .form-floating > label > i {
            color: #ffffff !important;
        }

        /* 4. Optional: Make the label turn neon green when actively typing */
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:focus ~ label > i {
            color: #39ff14 !important;
        }

        /* Alerts */
        .alert { background: rgba(30,30,30,0.9); border: 1px solid #444; color: #fff; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <div class="text-center py-4 bg-black bg-opacity-25">
                    <h1 class="display-6 mb-0 text-gradient"><i class="bi bi-box-seam"></i></h1>
                    <h4 class="fw-bold mt-2 mb-0 text-white">Restaurant Inventory</h4>
                    <p class="text-white small mb-0">Secure System Access</p>
                </div>

                <div class="card-body p-4 p-sm-5">

                    <div th:if="${param.error}" class="alert alert-danger text-center fs-6 shadow-sm" role="alert">
                        <i class="bi bi-exclamation-octagon-fill me-2"></i>Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center fs-6 shadow-sm" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>Logged out successfully.
                    </div>
                    <div th:if="${param.success}" class="alert alert-success text-center fs-6 shadow-sm" role="alert">
                        <i class="bi bi-person-check-fill me-2"></i>Registration successful!
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
                            <label for="username"><i class="bi bi-person me-2"></i>Username</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password"><i class="bi bi-key me-2"></i>Password</label>
                        </div>

                        <button type="submit" class="btn btn-gradient btn-lg w-100 shadow-sm mb-3">
                            Sign In <i class="bi bi-box-arrow-in-right ms-1"></i>
                        </button>
                    </form>

                    <div class="text-center mt-3 border-top border-secondary pt-3">
                        <span class="text-white small">Don't have an account?</span><br>
                        <a th:href="@{/register}" class="text-decoration-none fw-bold text-gradient">Create an Account</a>
                    </div>

                </div>
            </div>

            <div class="text-center mt-4 text-muted small">
                &copy; 2026 Inventory Management System
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
